name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web and sync Android
        run: npm run mobile:sync
        env:
          VITE_MOBILE_API_BASE_URL: https://agro-yordam.vercel.app

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Prepare APK filename
        run: cp android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/agro-yordam-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agro-yordam-debug-apk
          path: android/app/build/outputs/apk/debug/agro-yordam-debug.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: Agro Yordam APK
          prerelease: true
          files: android/app/build/outputs/apk/debug/agro-yordam-debug.apk
